services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: opennewswire
      POSTGRES_USER: opennewswire
      POSTGRES_PASSWORD: informationwantstobefree
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"

volumes:
  postgres_data:
    driver: local
