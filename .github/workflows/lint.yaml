name: Lint

env:
  HUSKY: 0

on:
  push:
    branches: ["*", "*/*", "**"]
  pull_request:
    branches: ["*", "*/*", "**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run format
      - name: Knip
        run: npm run knip
